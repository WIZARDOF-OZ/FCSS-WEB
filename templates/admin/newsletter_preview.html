{% extends "admin/base_site.html" %} {% block content %}

<style>
  .preview-toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .btn-back-edit {
    background: #2a3347;
    color: #c5cfe0;
    border: 1px solid #3e4f68;
    padding: 9px 18px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
  }
  .btn-back-edit:hover {
    background: #354060;
    color: #fff;
  }
  .btn-send-confirm {
    background: #f8a800;
    color: #111;
    border: none;
    padding: 9px 22px;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-send-confirm:hover {
    background: #e09700;
  }
  .preview-subject {
    background: #1e2430;
    border: 1px solid #2e3a4e;
    border-radius: 8px;
    padding: 12px 18px;
    color: #f8c94a;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .preview-subject span {
    color: #8a9bb5;
    margin-right: 8px;
  }
  .preview-frame {
    border: 2px solid #2e3a4e;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
  }
  iframe {
    width: 100%;
    min-height: 600px;
    border: none;
    display: block;
  }
</style>

<h2 style="color: #e0e8f5; margin-bottom: 20px">👁 Email Preview</h2>

<div class="preview-subject"><span>Subject:</span> {{ subject }}</div>

<div class="preview-toolbar">
  <a href="./" class="btn-back-edit">← Edit Email</a>
  <form method="post" style="display: inline">
    {% csrf_token %}
    <input type="hidden" name="subject" value="{{ subject }}" />
    <input type="hidden" name="body_html" value="{{ body_html }}" />
    <button type="submit" name="send_newsletter" class="btn-send-confirm">
      📤 Looks good — Send Now
    </button>
  </form>
</div>

<div class="preview-frame">
  <iframe srcdoc="{{ preview_html|escape }}"></iframe>
</div>
{% endblock %}
